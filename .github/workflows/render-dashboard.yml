name: Render Evidence Dashboard

on:
  repository_dispatch:
    types: [render-dashboard]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout evidence template
        uses: actions/checkout@v4

      - name: Clone analysis evidence/ directory
        run: |
          gh repo clone "${{ github.event.client_payload.github_repo }}" /tmp/analysis-repo -- --depth 1
          if [ -d /tmp/analysis-repo/evidence/pages ]; then
            cp -r /tmp/analysis-repo/evidence/pages/. ./pages/
          fi
          if [ -d /tmp/analysis-repo/evidence/sources ]; then
            cp -r /tmp/analysis-repo/evidence/sources/. ./sources/
          fi
          echo "Evidence files copied"
          ls -la pages/ sources/results/ 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Download Parquet results from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
        run: |
          PREFIX="${{ github.event.client_payload.r2_prefix }}"
          aws s3 cp "s3://${{ secrets.R2_BUCKET }}/${PREFIX}/data/" ./sources/results/ \
            --recursive --include "*.parquet" || \
            echo "WARNING: no Parquet files found"
          ls -lh sources/results/*.parquet 2>/dev/null || echo "  (none)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Evidence dependencies
        run: |
          # --ignore-scripts skips @evidence-dev/sdk's postinstall TypeScript build
          # (the dist/ JS is already included in the published package).
          npm install --ignore-scripts --legacy-peer-deps
          # evidence build needs the .evidence/template SvelteKit project to exist.
          # Run the Evidence CLI init to create it (won't start a dev server).
          npx evidence --help > /dev/null 2>&1 || true
          # Re-run just the Evidence postinstall to scaffold .evidence/template/
          node node_modules/@evidence-dev/evidence/src/cli/index.js build --help > /dev/null 2>&1 || true
          if [ ! -d .evidence/template ]; then
            echo "Manually initializing Evidence template..."
            node -e "
              const {execSync} = require('child_process');
              try { execSync('npx evidence dev --exit', {stdio:'pipe', timeout:10000}); } catch(e) {}
            " 2>/dev/null || true
          fi
          echo "Contents of .evidence:"
          ls -la .evidence/ 2>/dev/null || echo "  (.evidence not created)"

      - name: Build Evidence dashboard
        run: npm run build
        env:
          EVIDENCE_DISABLE_TELEMETRY: true

      - name: Upload dashboard to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
        run: |
          PREFIX="${{ github.event.client_payload.r2_prefix }}"
          aws s3 sync ./build/ \
            "s3://${{ secrets.R2_BUCKET }}/${PREFIX}/dashboard/" \
            --delete
          echo "Dashboard uploaded"
