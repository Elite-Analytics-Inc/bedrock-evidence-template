name: Render Evidence Dashboard

on:
  repository_dispatch:
    types: [render-dashboard]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout evidence template
        uses: actions/checkout@v4

      - name: Clone analysis evidence/ directory
        run: |
          gh repo clone "${{ github.event.client_payload.github_repo }}" /tmp/analysis-repo -- --depth 1
          if [ -d /tmp/analysis-repo/evidence/pages ]; then
            cp -r /tmp/analysis-repo/evidence/pages/. ./pages/
          fi
          if [ -d /tmp/analysis-repo/evidence/sources ]; then
            cp -r /tmp/analysis-repo/evidence/sources/. ./sources/
          fi
          echo "Evidence files copied"
          ls -la pages/ sources/results/ 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Download Parquet results from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
        run: |
          PREFIX="${{ github.event.client_payload.r2_prefix }}"
          aws s3 cp "s3://${{ secrets.R2_BUCKET }}/${PREFIX}/data/" ./sources/results/ \
            --recursive --include "*.parquet" || \
            echo "WARNING: no Parquet files found"
          ls -lh sources/results/*.parquet 2>/dev/null || echo "  (none)"

      - name: Build DuckDB database from Parquet files
        run: |
          pip install duckdb --quiet
          python3 << 'PYEOF'
          import duckdb, glob, os, re

          parquets = sorted(glob.glob('sources/results/*.parquet'))
          if not parquets:
              print("No Parquet files — skipping DuckDB creation")
              exit(0)

          conn = duckdb.connect('sources/results/results.duckdb')
          for f in parquets:
              name = os.path.splitext(os.path.basename(f))[0]
              conn.execute(f"CREATE TABLE IF NOT EXISTS \"{name}\" AS SELECT * FROM read_parquet('{f}')")
              n = conn.execute(f'SELECT count(*) FROM "{name}"').fetchone()[0]
              print(f"  {name}: {n} rows")
              # Rewrite companion SQL to query the table directly (no read_parquet)
              sql_path = f'sources/results/{name}.sql'
              if os.path.exists(sql_path):
                  sql = open(sql_path).read()
                  sql = re.sub(r"read_parquet\('[^']+'\)", f'"{name}"', sql)
                  open(sql_path, 'w').write(sql)
                  print(f"  rewrote {sql_path}")
          conn.close()

          # Point connection.yaml at the persistent db file
          path = 'sources/results/connection.yaml'
          content = open(path).read().replace('":memory:"', '"results.duckdb"')
          open(path, 'w').write(content)
          print("Updated results.connection.yaml → results.duckdb")
          PYEOF

      - name: Copy Parquet files to static dir for DuckDB-WASM
        run: |
          mkdir -p static/data/results
          cp sources/results/*.parquet static/data/results/ 2>/dev/null || true
          ls -lh static/data/results/ 2>/dev/null || echo "  (no parquets to copy)"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure Evidence (plugins + base path)
        run: |
          cat > evidence.config.yaml <<EOFCFG
          plugins:
            components:
              "@evidence-dev/core-components": {}
            datasources:
              "@evidence-dev/duckdb": {}
          deployment:
            basePath: /analysis_runs/${{ github.event.client_payload.job_id }}/dashboard
          EOFCFG
          sed -i 's/^          //' evidence.config.yaml
          echo "evidence.config.yaml:"
          cat evidence.config.yaml

      - name: Install Evidence dependencies
        run: npm install

      - name: Generate Evidence sources
        run: npx evidence sources

      - name: Build Evidence dashboard
        run: npm run build
        env:
          EVIDENCE_DISABLE_TELEMETRY: true

      - name: Upload dashboard to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_ENDPOINT_URL: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          AWS_DEFAULT_REGION: auto
        run: |
          PREFIX="${{ github.event.client_payload.r2_prefix }}"
          aws s3 sync ./build/ \
            "s3://${{ secrets.R2_BUCKET }}/${PREFIX}/dashboard/" \
            --delete
          echo "Dashboard uploaded"

      - name: Notify Rails
        run: |
          curl -s -X POST "${{ secrets.RAILS_CALLBACK_URL }}/webhooks/analysis/${{ github.event.client_payload.job_id }}/dashboard_ready" \
            -H "X-Bedrock-Token: ${{ secrets.BEDROCK_WEBHOOK_SECRET }}" \
            --max-time 10 || echo "Webhook notification failed (non-fatal)"
